name: Sync Images to GHCR

on:
  workflow_dispatch:
    inputs:
      parallel:
        description: 'Number of parallel syncs'
        required: false
        default: '4'
        type: string
  schedule:
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: ${{ github.repository_owner }}
  REGSYNC_VERSION: v0.7.1

jobs:
  sync-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install regsync
        run: |
          echo "Installing regsync ${REGSYNC_VERSION}..."

          # Download regsync binary
          curl -L "https://github.com/regclient/regclient/releases/download/${REGSYNC_VERSION}/regsync-linux-amd64" \
            -o /usr/local/bin/regsync

          chmod +x /usr/local/bin/regsync

          # Verify installation
          regsync version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare regsync config
        run: |
          # Set target registry in environment
          export REGSYNC_TARGET_REGISTRY="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/registry"

          # Expand environment variables in config
          envsubst < regsync-config.yaml > regsync-config-expanded.yaml

          echo "Regsync configuration prepared:"
          echo "Target registry: ${REGSYNC_TARGET_REGISTRY}"
          echo ""

          # Show first few sync targets
          echo "Sample sync targets:"
          yq eval '.sync[:5]' regsync-config-expanded.yaml || head -50 regsync-config-expanded.yaml

      - name: Sync images
        run: |
          echo "Syncing images to GHCR"
          echo "==========================================="

          # Run regsync once
          regsync once -c regsync-config-expanded.yaml -v info

          echo ""
          echo "Sync completed successfully!"

      - name: Generate sync report
        if: always()
        run: |
          echo "## Image Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target Registry:** ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/registry" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count total images
          TOTAL=$(grep -c "^  - source:" regsync-config.yaml || echo "0")
          echo "**Total Images:** ${TOTAL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Images have been synced to the target registry." >> $GITHUB_STEP_SUMMARY

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Image sync failed!"
          echo "Please check the logs above for details."
          exit 1
