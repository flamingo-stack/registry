name: Sync Images to GHCR

permissions:
  contents: read
  packages: write

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      parallel:
        description: 'Number of parallel syncs'
        required: false
        default: '4'
        type: string

env:
  REGISTRY: ghcr.io

# =============================================================================
# JOBS
# =============================================================================

jobs:
  sync-images:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install regsync
        env:
          REGSYNC_VERSION: v0.9.2
        run: |
          echo "Installing regsync ${REGSYNC_VERSION}..."

          # Download regsync binary
          curl -L "https://github.com/regclient/regclient/releases/download/${REGSYNC_VERSION}/regsync-linux-amd64" \
            -o /usr/local/bin/regsync

          chmod +x /usr/local/bin/regsync

      - name: Sync images
        env:
          TARGET_REGISTRY: ${{ github.repository }}
        run: |
          envsubst < regsync-config.yaml > regsync-config-tmp.yaml
          regsync check -c regsync-config-tmp.yaml 
