name: Sync Images to GHCR

on:
  workflow_dispatch:
    inputs:
      parallel:
        description: 'Number of parallel syncs'
        required: false
        default: '4'
        type: string
  schedule:
    - cron: '0 2 * * 0'

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: ${{ github.repository_owner }}
  REGSYNC_VERSION: v0.7.1

jobs:
  sync-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install regsync
        run: |
          echo "Installing regsync ${REGSYNC_VERSION}..."

          # Download regsync binary
          curl -L "https://github.com/regclient/regclient/releases/download/${REGSYNC_VERSION}/regsync-linux-amd64" \
            -o /usr/local/bin/regsync

          chmod +x /usr/local/bin/regsync

          # Verify installation
          regsync version

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Sync images
        run: |
          echo "Syncing images to GHCR"
          echo "==========================================="

          # Run regsync once
          regsync once -c regsync-config.yaml -v info

          echo ""
          echo "Sync completed successfully!"