  - source: jaegertracing/all-in-one:latest
    target: ${REGSYNC_TARGET_REGISTRY}/jaeger:all-in-one-latest
    type: image

  - source: otel/opentelemetry-collector-contrib-dev:latest
    target: ${REGSYNC_TARGET_REGISTRY}/otel-collector-contrib:dev-latest
    type: image

  # Elastic Stack
  - source: docker.elastic.co/elasticsearch/elasticsearch:7.17.25
    target: ${REGSYNC_TARGET_REGISTRY}/elasticsearch:7.17.25
    type: image

  - source: docker.elastic.co/kibana/kibana:7.17.25
    target: ${REGSYNC_TARGET_REGISTRY}/kibana:7.17.25
    type: image

  - source: docker.elastic.co/apm/apm-server:7.17.25
    target: ${REGSYNC_TARGET_REGISTRY}/apm-server:7.17.25
