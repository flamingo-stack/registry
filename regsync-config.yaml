# Regsync Configuration
# This config syncs selected images to a target registry
# Usage: regsync once -c regsync-config.yaml

version: 1

# Credentials can be set via environment variables:
# - REGSYNC_SOURCE_USERNAME / REGSYNC_SOURCE_PASSWORD
# - REGSYNC_TARGET_USERNAME / REGSYNC_TARGET_PASSWORD
# Or use ~/.docker/config.json

# Target registry configuration
# Override with: export REGSYNC_TARGET_REGISTRY=ghcr.io/your-org
defaults:
  parallel: 4
  interval: 0s  # Run once
  backup: ""    # No backup

sync:

  - source: docker.io/bats/bats
    target: ${REGSYNC_TARGET_REGISTRY}/bats
    type: repository
    tags:
      allow:
        - "v1\\.4\\.[1-9]"        # v1.4.1-v1.4.9
        - "v1\\.4\\.[1-9][0-9]+"  # v1.4.10 and higher patch versions
        - "v1\\.[5-9]\\.[0-9]+"   # v1.5.0 and higher minor versions
        - "v[2-9]\\.[0-9]+\\.[0-9]+"  # v2.0.0 and higher major versions


  - source: docker.io/curlimages/curl
    target: ${REGSYNC_TARGET_REGISTRY}/curl
    type: repository
    tags:
      allow:
        - "8\\.[5-9]\\.[1-9][0-9]*"  # 8.5.x - 8.9.x (excluding .0 patch versions)
        - "8\\.[1-9][0-9]+\\.[0-9]+"  # 8.10+ minor versions
        - "9\\.[0-9]+\\.[0-9]+"    # 9.x.x versions
        - "[1-9][0-9]\\.[0-9]+\\.[0-9]+"  # 10+ major versions

  - source: docker.io/library/busybox
    target: ${REGSYNC_TARGET_REGISTRY}/busybox
    type: repository
    tags:
      allow:
        - "1\\.31\\.[1-9]"        # 1.31.1-1.31.9
        - "1\\.31\\.[1-9][0-9]+"  # 1.31.10 and higher patch versions
        - "1\\.3[2-9]\\.[0-9]+"   # 1.32+ minor versions
        - "1\\.[4-9][0-9]\\.[0-9]+"  # 1.40+ minor versions
        - "[2-9]\\.[0-9]+\\.[0-9]+"  # 2.0.0+ major versions

  - source: quay.io/kiwigrid/k8s-sidecar
    target: ${REGSYNC_TARGET_REGISTRY}/k8s-sidecar
    type: repository
    tags:
      allow:
        - "1\\.30\\.1[0-9]"       # 1.30.10-19
        - "1\\.30\\.[2-9][0-9]+"  # 1.30.20+
        - "1\\.3[1-9]\\.[0-9]+"   # 1.31+ minor versions
        - "1\\.[4-9][0-9]\\.[0-9]+"  # 1.40+ minor versions
        - "[2-9]\\.[0-9]+\\.[0-9]+"  # 2.0.0+ major versions


  - source: docker.io/grafana/grafana
    target: ${REGSYNC_TARGET_REGISTRY}/grafana
    type: repository
    tags:
      allow:
        - "11\\.[1-9]\\.[0-9]+"       # 11.1.0+ minor versions
        - "11\\.[1-9][0-9]+\\.[0-9]+" # 11.10+ minor versions
        - "1[2-9]\\.[0-9]+\\.[0-9]+"  # 12+ major versions
        - "[2-9][0-9]\\.[0-9]+\\.[0-9]+"  # 20+ major versions

  - source: docker.io/grafana/grafana-image-renderer
    target: ${REGSYNC_TARGET_REGISTRY}/grafana-image-renderer
    type: repository
    tags:
      allow:
        - "[3-9]\\.[0-9]+\\.[0-9]+"   # 3.0.0+ versions
        - "[1-9][0-9]+\\.[0-9]+\\.[0-9]+"  # 10+ major versions


  - source: ghcr.io/grafana/helm-charts/grafana
    target: ${REGSYNC_TARGET_REGISTRY}/helm-charts/grafana
    type: repository
    tags:
      allow:
        - "1[0-9]\\.[0-9]+\\.[0-9]+"  # 10.x.x - 19.x.x versions
        - "[2-9][0-9]\\.[0-9]+\\.[0-9]+"  # 20+ major versions

  - source: ghcr.io/grafana/helm-charts/loki
    target: ${REGSYNC_TARGET_REGISTRY}/helm-charts/loki
    type: repository
    tags:
      allow:
        - "6\\.43\\.[0-9]+"            # 6.43.0+ patch versions
        - "6\\.[4-9][4-9]\\.[0-9]+"    # 6.44+ minor versions
        - "6\\.[5-9][0-9]+\\.[0-9]+"   # 6.50+ minor versions
        - "[7-9]\\.[0-9]+\\.[0-9]+"    # 7.0.0+ major versions
        - "[1-9][0-9]+\\.[0-9]+\\.[0-9]+"  # 10+ major versions

  - source: docker.io/grafana/loki
    target: ${REGSYNC_TARGET_REGISTRY}/loki
    type: repository
    tags:
      allow:
        - "3\\.5\\.[7-9]"              # 3.5.7-3.5.9
        - "3\\.5\\.[1-9][0-9]+"        # 3.5.10+ patch versions
        - "3\\.[6-9]\\.[0-9]+"         # 3.6+ minor versions
        - "[4-9]\\.[0-9]+\\.[0-9]+"    # 4.0.0+ major versions
        - "[1-9][0-9]+\\.[0-9]+\\.[0-9]+"  # 10+ major versions

  - source: docker.io/grafana/enterprise-logs
    target: ${REGSYNC_TARGET_REGISTRY}/enterprise-logs
    type: repository
    tags:
      allow:
        - "3\\.5\\.[4-9]"              # 3.5.4-3.5.9
        - "3\\.5\\.[1-9][0-9]+"        # 3.5.10+ patch versions
        - "3\\.[6-9]\\.[0-9]+"         # 3.6+ minor versions
        - "[4-9]\\.[0-9]+\\.[0-9]+"    # 4.0.0+ major versions
        - "[1-9][0-9]+\\.[0-9]+\\.[0-9]+"  # 10+ major versions

  - source: us-docker.pkg.dev/grafanalabs-global/docker-enterprise-provisioner-prod/enterprise-provisioner
    target: ${REGSYNC_TARGET_REGISTRY}/enterprise-provisioner
    type: repository
    tags:
      allow:
        - "latest"                     # latest tag

  - source: docker.io/nginxinc/nginx-unprivileged
    target: ${REGSYNC_TARGET_REGISTRY}/nginx-unprivileged
    type: repository
    tags:
      allow:
        - "1\\.29-alpine"              # 1.29-alpine
        - "1\\.[3-9][0-9]+-alpine"     # 1.30+-alpine minor versions
        - "[2-9]\\.[0-9]+-alpine"      # 2.0+-alpine major versions
        - "[1-9][0-9]+\\.[0-9]+-alpine"  # 10.0+-alpine major versions
  
  - source: alpine
    target: registry.example.org/library/alpine
    type: repository
    tagSets: 
      - semverRange:
        - ">=3.18.0"
        # allow:
        # - '\d+\.\d+\.\d+'
