# Must override TARGET_REGISTRY environment variable
# Example: export TARGET_REGISTRY=ghcr.io/your-username

version: 1

defaults:
  parallel: 4
  interval: 0s  # Run once
  backup: ""    # No backup

sync:

  # =============================================================================
  # CONTAINER IMAGES
  # =============================================================================

  # ---------------------------------------------------------------------------
  # Databases
  # SQL and NoSQL database engines for persistent data storage
  # Includes: Cassandra, Memcached, MongoDB, MySQL, PostgreSQL, Redis
  # ---------------------------------------------------------------------------

  - source: docker.io/bitnamilegacy/cassandra
    target: ${TARGET_REGISTRY}/bitnamilegacy/cassandra
    type: repository
    tags:
      semverRange:
        - ">=5.0.0"
      allow:
        - '[0-9]+\.[0-9]+\.[0-9]+-debian-[0-9]+-r[0-9]+'
        - '[0-9]+\.[0-9]+\.[0-9]+'

  - source: docker.io/library/memcached
    target: ${TARGET_REGISTRY}/memcached
    type: repository
    tags:
      allow:
        - '1\.6\.(39|[4-9][0-9]|[0-9]{3,})-alpine'
        - '1\.([7-9]|[0-9]{2,})\.[0-9]+-alpine'
        - '[2-9]\.[0-9]+\.[0-9]+-alpine'

  - source: docker.io/library/mongo
    target: ${TARGET_REGISTRY}/mongo
    type: repository
    tags:
      semverRange:
        - ">=7.0.18"
      allow:
        - '[0-9]+\.[0-9]+\.[0-9]+'

  - source: docker.io/library/mongo-express
    target: ${TARGET_REGISTRY}/mongo-express
    type: repository
    tags:
      semverRange:
        - ">=1.0.0"
      allow:
        - '[0-9]+\.[0-9]+\.[0-9]+'

  - source: docker.io/library/mysql
