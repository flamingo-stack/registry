# Must override TARGET_REGISTRY environment variable
# Example: export TARGET_REGISTRY=ghcr.io/your-username

version: 1

defaults:
  parallel: 4
  interval: 0s  # Run once
  backup: ""    # No backup

sync:
  
  - source: docker.io/apachepinot/pinot
    target: ${TARGET_REGISTRY}/apachepinot/pinot
    type: repository
    tagSets:  
      - allow: # first set of tags is a fixed list of tags
        - "latest"
        - "1.5.0-SNAPSHOT-43142cdc37-20251204"
      - semverRange:
        - ">=0.1.0"
        allow:
          - '[0-9]+\.[0-9]+\.[0-9]+'
          - latest 

  - source: docker.io/curlimages/curl
    target: ${TARGET_REGISTRY}/curlimages/curl
    type: repository
