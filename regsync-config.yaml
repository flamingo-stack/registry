  # Storage & Infrastructure
  - source: quay.io/minio/minio:latest
    target: ${REGSYNC_TARGET_REGISTRY}/minio:latest
    type: image

  - source: localstack/localstack:latest
    target: ${REGSYNC_TARGET_REGISTRY}/localstack:latest
