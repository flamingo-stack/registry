      semverRange:
        - ">=8.0.35"
      allow:
        - '[0-9]+\.[0-9]+\.[0-9]+'

  - source: docker.io/library/postgres
    target: ${TARGET_REGISTRY}/postgres
    type: repository
    tags:
      semverRange:
        - ">=12.0.0"
      allow:
        - '[0-9]+-alpine'
        - '[0-9]+\.[0-9]+-alpine'

  - source: docker.io/bitnamilegacy/redis
    target: ${TARGET_REGISTRY}/bitnamilegacy/redis
    type: repository
    tags:
      semverRange:
