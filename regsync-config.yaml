  # Databases
  - source: postgres:15
    target: ${REGSYNC_TARGET_REGISTRY}/postgres:15
    type: image

  - source: postgres:13-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/postgres:13-alpine
    type: image

  - source: postgres:14-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/postgres:14-alpine
    type: image

  - source: postgres:alpine
    target: ${REGSYNC_TARGET_REGISTRY}/postgres:alpine
    type: image

  - source: postgres:latest
    target: ${REGSYNC_TARGET_REGISTRY}/postgres:latest
    type: image

  # ============================================
  # SECTION 2: Docker Compose Service Images
  # ============================================

  # MySQL
  - source: mysql:8.0.36
    target: ${REGSYNC_TARGET_REGISTRY}/mysql:8.0.36
