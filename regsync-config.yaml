# Regsync Configuration
# This config syncs all images to a target registry
# Usage: regsync once -c regsync-config.yaml

version: 1

# Credentials can be set via environment variables:
# - REGSYNC_SOURCE_USERNAME / REGSYNC_SOURCE_PASSWORD
# - REGSYNC_TARGET_USERNAME / REGSYNC_TARGET_PASSWORD
# Or use ~/.docker/config.json

# Target registry configuration
# Override with: export REGSYNC_TARGET_REGISTRY=ghcr.io/your-org
defaults:
  parallel: 4
  interval: 0s  # Run once
  backup: ""    # No backup

sync:
  # ============================================
  # SECTION 1: Base Images (FROM Dockerfiles)
  # ============================================

  # Java/JDK Runtime
  - source: eclipse-temurin:21-jdk-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/eclipse-temurin:21-jdk-alpine
    type: image

  - source: eclipse-temurin:21-jre-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/eclipse-temurin:21-jre-alpine
    type: image

  # Node.js
  - source: node:22-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/node:22-alpine
    type: image

  - source: node:21-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/node:21-alpine
    type: image

  - source: node:20-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/node:20-alpine
    type: image

  - source: node:20
    target: ${REGSYNC_TARGET_REGISTRY}/node:20-pinned
    type: image

  # Python
  - source: python:3.11.8-slim
    target: ${REGSYNC_TARGET_REGISTRY}/python:3.11.8-slim
    type: image

  # Golang
  - source: golang:1.24.4-bullseye
    target: ${REGSYNC_TARGET_REGISTRY}/golang:1.24.4-bullseye
    type: image

  - source: golang:1.24.4-alpine3.21
    target: ${REGSYNC_TARGET_REGISTRY}/golang:1.24.4-alpine3.21
    type: image

  - source: golang:1.21-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/golang:1.21-alpine
    type: image

  # Rust
  - source: rust:1.82
    target: ${REGSYNC_TARGET_REGISTRY}/rust:1.82
    type: image

  - source: rust:latest
    target: ${REGSYNC_TARGET_REGISTRY}/rust:latest-pinned
    type: image

  # Alpine Linux
  - source: alpine:3.21.3
    target: ${REGSYNC_TARGET_REGISTRY}/alpine:3.21.3
    type: image

  - source: alpine:3.21
    target: ${REGSYNC_TARGET_REGISTRY}/alpine:3.21
    type: image

  - source: alpine:3.19
    target: ${REGSYNC_TARGET_REGISTRY}/alpine:3.19
    type: image

  # Debian
  - source: debian:stable-slim
    target: ${REGSYNC_TARGET_REGISTRY}/debian:stable-slim
    type: image

  - source: debian:bookworm-slim
    target: ${REGSYNC_TARGET_REGISTRY}/debian:bookworm-slim
    type: image

  - source: debian:12.8
    target: ${REGSYNC_TARGET_REGISTRY}/debian:12.8
    type: image

  # Distribution Specific
  - source: amazonlinux:2023
    target: ${REGSYNC_TARGET_REGISTRY}/amazonlinux:2023
    type: image

  - source: quay.io/centos/centos:stream10
    target: ${REGSYNC_TARGET_REGISTRY}/centos:stream-10
    type: image

  - source: ubuntu:24.04
    target: ${REGSYNC_TARGET_REGISTRY}/ubuntu:24.04
    type: image

  - source: redhat/ubi9:9.5
    target: ${REGSYNC_TARGET_REGISTRY}/ubi9:9.5
    type: image

  - source: fedora:41
    target: ${REGSYNC_TARGET_REGISTRY}/fedora:41
    type: image

  # Web Servers
  - source: nginx:1.26.2
    target: ${REGSYNC_TARGET_REGISTRY}/nginx:1.26.2
    type: image

  - source: nginx:latest
    target: ${REGSYNC_TARGET_REGISTRY}/nginx:latest
    type: image

  - source: nginxinc/nginx-unprivileged:stable-alpine
    target: ${REGSYNC_TARGET_REGISTRY}/nginx-unprivileged:stable-alpine
