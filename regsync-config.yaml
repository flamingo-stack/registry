# Must override REGISTRY and TARGET_REGISTRY Env varibles

version: 1

defaults:
  parallel: 4
  interval: 0s  # Run once
  backup: ""    # No backup

sync:
  
  - source: alpine
    target: ${REGISTRY}/${TARGET_REGISTRY}/alpine
    type: repository
    tagSets: 
      - semverRange:
        - ">=3.18.0"
        allow:
        - '\d+\.\d+\.\d+'
